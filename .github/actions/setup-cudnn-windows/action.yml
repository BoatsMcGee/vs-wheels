name: Setup cuDNN (Windows)
description: Download and configure cuDNN
inputs:
  cudnn-version:
    description: cuDNN version for Windows (e.g. 9.13.0.50)
    required: true
  cuda-version:
    description: CUDA major version (e.g. 13)
    required: true
  cache:
    description: Whether to enable cache
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Define cache key
      id: cache-key
      if: inputs.cache != 'false'
      shell: bash
      run: |
        echo "key=${{ format(
          'setup-cudnn-{0}-{1}-{2}-{3}',
          runner.os,
          runner.arch,
          inputs.cudnn-version,
          inputs.cuda-version
        ) }}" >> $GITHUB_OUTPUT

    - name: Restore cuDNN
      id: cache-cudnn
      if: inputs.cache != 'false'
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: cudnn-windows-x86_64-${{ inputs.cudnn-version }}_cuda${{ inputs.cuda-version }}-archive
        key: ${{ steps.cache-key.outputs.key }}

    - name: Download cuDNN
      if: steps.cache-cudnn.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        curl.exe -LJ -o cudnn.zip `
          https://developer.download.nvidia.com/compute/cudnn/redist/cudnn/windows-x86_64/cudnn-windows-x86_64-${{ inputs.cudnn-version }}_cuda${{ inputs.cuda-version }}-archive.zip
        Expand-Archive -LiteralPath cudnn.zip -DestinationPath . -Force

    - name: Save cuDNN
      if: inputs.cache != 'false' && steps.cache-cudnn.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: cudnn-windows-x86_64-${{ inputs.cudnn-version }}_cuda${{ inputs.cuda-version }}-archive
        key: ${{ steps.cache-key.outputs.key }}

    - name: Configure cuDNN Path
      shell: pwsh
      run: |
        $cudnnPath = (Get-ChildItem -Path "cudnn-windows-x86_64-*" | Select-Object -First 1).FullName
        echo "CUDNN_HOME=$cudnnPath" >> $env:GITHUB_ENV
        echo "CUDNN_PATH=$cudnnPath" >> $env:GITHUB_ENV
