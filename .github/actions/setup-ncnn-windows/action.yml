name: Setup NCNN (Windows)
description: Builds NCNN for Windows
inputs:
  os:
    description: The OS runner name (e.g. windows-2025-vs2026)
    required: true
  ncnn-tag:
    description: The Git tag or commit hash of NCNN to build
    required: true
  vulkan-version:
    description: The version of the Vulkan SDK to use
    required: true

runs:
  using: composite
  steps:
    - name: Define cache key
      id: cache-key
      shell: pwsh
      run: |
        "key=${{ format(
          'setup-ncnn-{0}-{1}-vulkan-{2}-{3}',
          inputs.os,
          inputs.ncnn-tag,
          inputs.vulkan-version,
          hashFiles('.github/cmake-cache/ncnn-base.cmake', '.github/cmake-cache/ncnn-windows.cmake')
        ) }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Restore NCNN
      id: cache-ncnn
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: ncnn-dist
        key: ${{ steps.cache-key.outputs.key }}

    - name: Install Vulkan SDK
      uses: jakoch/install-vulkan-sdk-action@37effcfa045411f8bfbbda26df2fd1b3bf3436fa # v1.6.0
      with:
        vulkan_version: ${{ inputs.vulkan-version }}

    - name: Checkout ncnn
      if: steps.cache-ncnn.outputs.cache-hit != 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        repository: Tencent/ncnn
        ref: ${{ inputs.ncnn-tag }}
        path: ncnn
        submodules: recursive

    - name: Configure NCNN
      if: steps.cache-ncnn.outputs.cache-hit != 'true'
      shell: pwsh
      run: cmake -S ncnn -B build_ncnn -G Ninja
        -C "$env:GITHUB_WORKSPACE\.github\cmake-cache\ncnn-base.cmake"
        -C "$env:GITHUB_WORKSPACE\.github\cmake-cache\ncnn-windows.cmake"

    - name: Build NCNN
      if: steps.cache-ncnn.outputs.cache-hit != 'true'
      shell: pwsh
      run: cmake --build build_ncnn

    - name: Install NCNN
      if: steps.cache-ncnn.outputs.cache-hit != 'true'
      shell: pwsh
      run: cmake --install build_ncnn --prefix ncnn-dist

    - name: Save NCNN
      if: steps.cache-ncnn.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: ncnn-dist
        key: ${{ steps.cache-key.outputs.key }}

    - name: Configure NCNN Path
      shell: pwsh
      run: |
        $ncnnRoot = (Resolve-Path "ncnn-dist").Path
        "CMAKE_PREFIX_PATH=$ncnnRoot;$env:CMAKE_PREFIX_PATH".TrimEnd(';') | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Upload NCNN
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ steps.cache-key.outputs.key }}
        path: ncnn-dist
        retention-days: 1
