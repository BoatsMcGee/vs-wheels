name: Setup ONNX (macOS)
description: Compiles ONNX from source on macOS
inputs:
  onnx-tag:
    description: The Git tag or commit hash of ONNX to build
    required: true
  use-external-protobuf:
    description: Use protobuf from CMAKE_PREFIX_PATH instead of building from submodule
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Define cache key
      id: cache-key
      shell: bash
      run: |
        PROTO_MODE="custom"
        if [ "${{ inputs.use-external-protobuf }}" = "true" ]; then
          PROTO_MODE="external"
        fi
        echo "key=${{ format(
          'setup-onnx-{0}-{1}-{2}-{3}',
          runner.os,
          runner.arch,
          inputs.onnx-tag,
          hashFiles('.github/cmake-cache/onnx-base.cmake', '.github/cmake-cache/onnx-unix.cmake')
        ) }}-${PROTO_MODE}" >> $GITHUB_OUTPUT

    - name: Restore ONNX
      id: cache-onnx
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          onnx-dist
          build_onnx
        key: ${{ steps.cache-key.outputs.key }}

    - name: Install dependencies
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      shell: bash
      run: brew install ninja

    - name: Checkout onnx
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: onnx/onnx
        ref: ${{ inputs.onnx-tag }}
        path: onnx
        submodules: recursive

    - name: Configure ONNX
      shell: bash
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      run: |
        CMAKE_ARGS=(
          -S onnx -B build_onnx -G Ninja -LA
          -C "$GITHUB_WORKSPACE/.github/cmake-cache/onnx-base.cmake"
          -C "$GITHUB_WORKSPACE/.github/cmake-cache/onnx-unix.cmake"
        )
        if [ "${{ inputs.use-external-protobuf }}" = "true" ]; then
          CMAKE_ARGS+=(-DONNX_BUILD_CUSTOM_PROTOBUF=OFF)
        fi
        cmake "${CMAKE_ARGS[@]}"

    - name: Build ONNX
      shell: bash
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      run: cmake --build build_onnx

    - name: Install ONNX
      shell: bash
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      run: cmake --install build_onnx --prefix onnx-dist

    - name: Save ONNX
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: |
          onnx-dist
          build_onnx
        key: ${{ steps.cache-key.outputs.key }}

    - name: Configure ONNX Path
      shell: bash
      run: |
        onnxRoot=$(realpath onnx-dist)
        echo "CMAKE_PREFIX_PATH=$onnxRoot${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> $GITHUB_ENV

    - name: Upload ONNX
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ steps.cache-key.outputs.key }}
        path: onnx-dist
        retention-days: 1
