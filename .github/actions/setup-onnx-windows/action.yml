name: Setup ONNX (Windows)
description: Compiles ONNX from source on Windows
inputs:
  os:
    description: The OS runner name (e.g. windows-2025-vs2026)
    required: true
  onnx-tag:
    description: The Git tag or commit hash of ONNX to build
    required: true
  use-external-protobuf:
    description: Use protobuf from CMAKE_PREFIX_PATH instead of building from submodule
    required: false
    default: "false"

runs:
  using: composite
  steps:
    - name: Define cache key
      id: cache-key
      shell: pwsh
      run: |
        $protoMode = if ("${{ inputs.use-external-protobuf }}" -eq "true") { "external" } else { "custom" }
        "key=${{ format(
          'setup-onnx-{0}-{1}-{2}',
          inputs.os,
          inputs.onnx-tag,
          hashFiles('.github/cmake-cache/onnx-base.cmake', '.github/cmake-cache/onnx-windows.cmake')
        ) }}-$protoMode" | Out-File -FilePath $env:GITHUB_OUTPUT -Append

    - name: Restore ONNX
      id: cache-onnx
      uses: actions/cache/restore@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: |
          onnx-dist
          build_onnx
        key: ${{ steps.cache-key.outputs.key }}

    - name: Checkout onnx
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        repository: onnx/onnx
        ref: ${{ inputs.onnx-tag }}
        path: onnx
        submodules: recursive

    - name: Configure ONNX
      shell: pwsh
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      run: |
        $cmakeArgs = @(
          "-S", "onnx", "-B", "build_onnx", "-G", "Ninja", "-LA",
          "-C", "$env:GITHUB_WORKSPACE\.github\cmake-cache\onnx-base.cmake",
          "-C", "$env:GITHUB_WORKSPACE\.github\cmake-cache\onnx-windows.cmake"
        )
        if ("${{ inputs.use-external-protobuf }}" -eq "true") {
          $cmakeArgs += "-DONNX_BUILD_CUSTOM_PROTOBUF=OFF"
        }
        cmake @cmakeArgs

    - name: Build onnx
      shell: pwsh
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      run: cmake --build build_onnx

    - name: Install ONNX
      shell: pwsh
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      run: cmake --install build_onnx --prefix onnx-dist

    - name: Save ONNX
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      uses: actions/cache/save@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6
      with:
        path: |
          onnx-dist
          build_onnx
        key: ${{ steps.cache-key.outputs.key }}

    - name: Configure ONNX Path
      shell: pwsh
      run: |
        $onnxRoot = (Resolve-Path "onnx-dist").Path
        "CMAKE_PREFIX_PATH=$onnxRoot;$env:CMAKE_PREFIX_PATH".TrimEnd(';') | Out-File -FilePath $env:GITHUB_ENV -Append

    - name: Upload ONNX
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ steps.cache-key.outputs.key }}
        path: onnx-dist
        retention-days: 1
