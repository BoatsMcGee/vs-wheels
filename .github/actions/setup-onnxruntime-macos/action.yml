name: Setup ONNX Runtime (macOS)
description: Compiles ONNX Runtime from source on macOS
inputs:
  os:
    description: The OS runner name (e.g. macos-15)
    required: true
  onnxruntime-tag:
    description: The Git tag or commit hash of ONNX Runtime to build
    required: true

runs:
  using: composite
  steps:
    - name: Define ONNX Runtime cache key
      id: cache-key
      shell: bash
      run: |
        HASH="${{ hashFiles(
            '.github/cmake-cache/onnxruntime-base.cmake',
            '.github/cmake-cache/onnxruntime-macos.cmake'
          ) }}"
        echo "key=setup-onnxruntime-${{ inputs.os }}-${{ inputs.onnxruntime-tag }}-${HASH}" >> $GITHUB_OUTPUT

    - name: Restore ONNX Runtime
      id: cache-onnx
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: onnxruntime-dist
        key: ${{ steps.cache-key.outputs.key }}

    # Always check out onnxruntime to get the correct commit hash of onnx
    - name: Checkout ONNX Runtime
      uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      with:
        repository: microsoft/onnxruntime
        ref: ${{ inputs.onnxruntime-tag }}
        path: onnxruntime
        submodules: recursive

    - name: Configure ONNX Runtime
      shell: bash
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      run: |
        CMAKE_ARGS=(
          -S onnxruntime/cmake
          -B build_onnxruntime
          -G Ninja
          -Wno-dev
          -LA
          -C "$GITHUB_WORKSPACE/.github/cmake-cache/onnxruntime-base.cmake"
          -C "$GITHUB_WORKSPACE/.github/cmake-cache/onnxruntime-macos.cmake"
        )

        cmake "${CMAKE_ARGS[@]}"

    - name: Build ONNX Runtime
      shell: bash
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      run: cmake --build build_onnxruntime

    - name: Install ONNX Runtime
      shell: bash
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      run: cmake --install build_onnxruntime --prefix onnxruntime-dist

    - name: Save ONNX Runtime
      if: steps.cache-onnx.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: onnxruntime-dist
        key: ${{ steps.cache-key.outputs.key }}

    - name: Configure ONNX Path
      shell: bash
      run: |
        onnxRuntimeRoot=$(realpath onnxruntime-dist)
        echo "CMAKE_PREFIX_PATH=$onnxRuntimeRoot${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> $GITHUB_ENV
        echo "DYLD_LIBRARY_PATH=$onnxRuntimeRoot/lib${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}" >> $GITHUB_ENV

    - name: Upload ONNX Runtime
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ steps.cache-key.outputs.key }}
        path: onnxruntime-dist
        retention-days: 1
