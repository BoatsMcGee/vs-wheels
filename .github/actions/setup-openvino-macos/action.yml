name: Setup OpenVINO (macOS)
description: Compiles OpenVINO from source on macOS
inputs:
  os:
    description: The OS runner name (e.g. macos-15)
    required: true
  openvino-tag:
    description: The Git tag or commit hash of OpenVINO to build
    required: true

runs:
  using: composite
  steps:
    - name: Define OpenVINO cache key
      id: cache-key
      shell: bash
      run: |
        ARCH=$(uname -m)
        if [ "$ARCH" = "x86_64" ]; then
          ARCH_FILE=".github/cmake-cache/openvino-macos-x86_64.cmake"
        elif [ "$ARCH" = "arm64" ] || [ "$ARCH" = "aarch64" ]; then
          ARCH_FILE=".github/cmake-cache/openvino-macos-arm64.cmake"
        fi

        HASH="${{ hashFiles(
            '.github/cmake-cache/openvino-base.cmake',
            '.github/cmake-cache/openvino-macos.cmake',
            '.github/cmake-cache/openvino-macos-x86_64.cmake',
            '.github/cmake-cache/openvino-macos-arm64.cmake'
          ) }}"
        echo "key=setup-openvino-${{ inputs.os }}-${ARCH}-${{ inputs.openvino-tag }}-${HASH}" >> $GITHUB_OUTPUT
        echo "arch-file=$ARCH_FILE" >> $GITHUB_OUTPUT

    - name: Restore OpenVINO
      id: cache-openvino
      uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: openvino-dist
        key: ${{ steps.cache-key.outputs.key }}

    - name: Checkout OpenVINO
      if: steps.cache-openvino.outputs.cache-hit != 'true'
      uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
      with:
        repository: openvinotoolkit/openvino
        ref: ${{ inputs.openvino-tag }}
        path: openvino
        submodules: recursive

    - name: Install Build Dependencies
      shell: bash
      if: steps.cache-openvino.outputs.cache-hit != 'true'
      run: brew install scons

    - name: Install TBB
      shell: bash
      run: brew install tbb

    - name: Configure OpenVINO
      shell: bash
      if: steps.cache-openvino.outputs.cache-hit != 'true'
      run: |
        CMAKE_ARGS=(
          -S openvino
          -B build_openvino
          -G Ninja
          -Wno-dev
          -LA
          -C "$GITHUB_WORKSPACE/.github/cmake-cache/openvino-base.cmake"
          -C "$GITHUB_WORKSPACE/.github/cmake-cache/openvino-macos.cmake"
        )

        if [ -n "${{ steps.cache-key.outputs.arch-file }}" ]; then
          CMAKE_ARGS+=(-C "$GITHUB_WORKSPACE/${{ steps.cache-key.outputs.arch-file }}")
        fi

        cmake "${CMAKE_ARGS[@]}"

    - name: Build OpenVINO
      shell: bash
      if: steps.cache-openvino.outputs.cache-hit != 'true'
      run: cmake --build build_openvino

    - name: Install OpenVINO
      shell: bash
      if: steps.cache-openvino.outputs.cache-hit != 'true'
      run: |
        cmake --install build_openvino --prefix openvino-dist
        cmake --install build_openvino/thirdparty/protobuf --prefix openvino-dist

    - name: Save OpenVINO
      if: steps.cache-openvino.outputs.cache-hit != 'true'
      uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: openvino-dist
        key: ${{ steps.cache-key.outputs.key }}

    - name: Configure OpenVINO Path
      shell: bash
      run: |
        openvinoRoot=$(realpath openvino-dist)
        echo "CMAKE_PREFIX_PATH=$openvinoRoot/runtime/cmake:$openvinoRoot${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> $GITHUB_ENV

        libPath="$openvinoRoot/runtime/lib"
        libPath="$libPath:$openvinoRoot/runtime/lib/arm64"
        libPath="$libPath:$openvinoRoot/runtime/lib/arm64/Release"
        libPath="$libPath:$openvinoRoot/runtime/lib/intel64"
        libPath="$libPath:$openvinoRoot/runtime/lib/intel64/Release"
        libPath="$libPath:$(brew --prefix)/lib"

        echo "DYLD_LIBRARY_PATH=$libPath${DYLD_LIBRARY_PATH:+:$DYLD_LIBRARY_PATH}" >> $GITHUB_ENV

    - name: Upload OpenVINO
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      with:
        name: ${{ steps.cache-key.outputs.key }}
        path: openvino-dist
        retention-days: 1
