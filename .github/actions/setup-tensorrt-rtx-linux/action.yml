name: Setup TensorRT RTX (Linux)
description: Installs and configures NVIDIA TensorRT RTX and CUDA components for Linux (RHEL/Manylinux)
inputs:
  tensorrt-rtx-version:
    description: TensorRT RTX version (e.g., 1.4.0.76)
    required: true
  cuda-repo:
    description: CUDA repository path (e.g., rhel8/x86_64)
    required: true
  cuda-version:
    description: CUDA version (e.g., 13.2)
    required: true
  cuda-components:
    description: Comma-separated list of CUDA components to install
    required: false
    default: cuda-nvcc, cuda-cudart-devel

runs:
  using: composite
  steps:
    - name: Setup CUDA (Linux)
      uses: ./.github/actions/setup-cuda-linux
      with:
        cuda-version: ${{ inputs.cuda-version }}
        cuda-repo: ${{ inputs.cuda-repo }}
        cuda-components: ${{ inputs.cuda-components }}

    - name: Download TensorRT RTX
      shell: bash
      run: |
        TRT_RTX_VER="${{ inputs.tensorrt-rtx-version }}"
        CUDA_VER="${{ inputs.cuda-version }}"

        IFS='.' read -ra trt_parts <<< "$TRT_RTX_VER"
        full_trt_rtx_ver="$TRT_RTX_VER"
        short_trt_rtx_ver="${trt_parts[0]}.${trt_parts[1]}"

        IFS='.' read -ra cuda_parts <<< "$CUDA_VER"
        cuda_ver="${cuda_parts[0]}.${cuda_parts[1]}"

        major="${trt_parts[0]}"
        minor="${trt_parts[1]}"
        # Tarball extension changed starting from TensorRT RTX 1.5.0
        if [ "$major" -gt 1 ] || { [ "$major" -eq 1 ] && [ "$minor" -ge 5 ]; }; then
          EXT="tar.zst"
        else
          EXT="tar.gz"
        fi

        ARCH=$(uname -m)
        URL="https://developer.nvidia.com/downloads/trt/rtx_sdk/secure/${short_trt_rtx_ver}/TensorRT-RTX-${full_trt_rtx_ver}-Linux-${ARCH}-cuda-${cuda_ver}-Release-external.${EXT}"
        echo "Downloading TensorRT RTX from $URL"
        curl -L -o "trt.${EXT}" "$URL"

        echo "Extracting TensorRT RTX..."
        if [ "$EXT" = "tar.zst" ]; then
          dnf install -y zstd
          tar -I zstd -xf trt.tar.zst
        else
          tar -xzf trt.tar.gz
        fi
        extracted_folder=$(find . -maxdepth 1 -type d -name "TensorRT-RTX-*" | head -n 1)
        mv "$extracted_folder" tensorrt-rtx
        rm "trt.${EXT}"

    - name: Configure TensorRT Paths
      shell: bash
      run: |
        trt_path=$(realpath tensorrt-rtx)
        echo "TENSORRT_RTX_HOME=$trt_path" >> $GITHUB_ENV
        echo "TENSORRT_RTX_PATH=$trt_path" >> $GITHUB_ENV
        echo "LD_LIBRARY_PATH=$trt_path/lib:${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> $GITHUB_ENV
