name: Setup TensorRT (Windows - PyPI)
description: Installs NVIDIA TensorRT for Windows from PyPI + GitHub headers (no NVIDIA login required)
inputs:
  tensorrt-version:
    description: TensorRT version (e.g., 10.13.2.6)
    required: true
  cuda-version:
    description: CUDA major.minor version (e.g., 12.9) - used to select cu12/cu13 variant
    required: true
  cache-key:
    description: Extra cache key part
    required: false
    default: "default"

runs:
  using: "composite"
  steps:
    - name: Install TensorRT libs from PyPI
      shell: pwsh
      run: |
        $fullTrtVer = "${{ inputs.tensorrt-version }}"
        $cudaMajor = "${{ inputs.cuda-version }}".Split(".")[0]

        Write-Host "Installing TensorRT $fullTrtVer (CUDA $cudaMajor) from PyPI..."

        pip install "tensorrt_cu${cudaMajor}_libs==$fullTrtVer" --target tensorrt_pkg --extra-index-url https://pypi.nvidia.com/
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to install TensorRT libs from PyPI"
          exit 1
        }

        Write-Host "TensorRT libs installed successfully"

    - name: Download TensorRT headers from GitHub
      shell: pwsh
      run: |
        $fullTrtVer = "${{ inputs.tensorrt-version }}"
        $shortVer = $fullTrtVer -replace '\.\d+$', ''

        $headersUrl = "https://github.com/NVIDIA/TensorRT/archive/refs/tags/v$shortVer.zip"
        Write-Host "Downloading TensorRT headers from $headersUrl"

        curl.exe -L -o trt_headers.zip $headersUrl
        if (-not (Test-Path trt_headers.zip) -or (Get-Item trt_headers.zip).Length -lt 1MB) {
          Write-Error "Failed to download TensorRT headers"
          exit 1
        }

        Write-Host "Extracting TensorRT headers..."
        Expand-Archive -LiteralPath trt_headers.zip -DestinationPath . -Force

        $srcDir = (Get-ChildItem -Path "TensorRT-*" -Directory | Select-Object -First 1).FullName
        $includeSrc = Join-Path $srcDir "include"

        if (Test-Path $includeSrc) {
          if (Test-Path "trt_include") { Remove-Item "trt_include" -Recurse -Force }
          Move-Item $includeSrc trt_include
          Write-Host "TensorRT headers extracted to ./trt_include/"
        } else {
          Write-Warning "No include directory found in TensorRT source"
        }

        Remove-Item trt_headers.zip -Force -ErrorAction SilentlyContinue
        if (Test-Path $srcDir) { Remove-Item $srcDir -Recurse -Force -ErrorAction SilentlyContinue }

    - name: Setup TensorRT directory structure
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "tensorrt_home\include" | Out-Null
        New-Item -ItemType Directory -Force -Path "tensorrt_home\lib" | Out-Null

        # Copy headers
        if (Test-Path "trt_include") {
          Copy-Item "trt_include\*" "tensorrt_home\include\" -Recurse -Force
          Write-Host "Copied headers to tensorrt_home/include/"
        }

        # Find DLLs
        $trtLibs = Get-ChildItem -Path "tensorrt_pkg" -Directory -Filter "tensorrt_libs" | Select-Object -First 1
        if ($trtLibs) {
          $dlls = Get-ChildItem "$($trtLibs.FullName)\*.dll"
        } else {
          $dlls = Get-ChildItem -Path "tensorrt_pkg" -Recurse -Filter "*.dll"
        }

        foreach ($dll in $dlls) {
          Copy-Item $dll.FullName "tensorrt_home\lib\" -Force
        }

        Write-Host "TENSORRT_HOME structure:"
        Get-ChildItem "tensorrt_home\lib" | ForEach-Object { Write-Host "  $($_.Name)" }

    - name: Configure TensorRT Paths
      shell: pwsh
      run: |
        $trtHome = (Resolve-Path "tensorrt_home").Path

        Write-Host "TENSORRT_HOME=$trtHome"
        "TENSORRT_HOME=$trtHome" | Out-File -FilePath $env:GITHUB_ENV -Append
        "TENSORRT_PATH=$trtHome" | Out-File -FilePath $env:GITHUB_ENV -Append
