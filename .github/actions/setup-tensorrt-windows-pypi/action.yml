name: Setup TensorRT (Windows - PyPI)
description: Installs NVIDIA TensorRT for Windows from PyPI (no NVIDIA login required)
inputs:
  tensorrt-version:
    description: TensorRT version (e.g., 11.1.0.106)
    required: true
  cuda-version:
    description: CUDA version (e.g., 12.9.2) - used for cache key only
    required: true
  cache-key:
    description: Extra cache key part
    required: false
    default: "default"

runs:
  using: "composite"
  steps:
    - name: Install TensorRT from PyPI
      shell: pwsh
      run: |
        $fullTrtVer = "${{ inputs.tensorrt-version }}"
        Write-Host "Installing TensorRT $fullTrtVer from PyPI..."

        pip install "tensorrt==$fullTrtVer" --target tensorrt_pkg --extra-index-url https://pypi.nvidia.com/
        if ($LASTEXITCODE -ne 0) {
          Write-Error "Failed to install TensorRT $fullTrtVer from PyPI"
          exit 1
        }

        Write-Host "TensorRT installed successfully"
        Get-ChildItem tensorrt_pkg -Depth 1 | ForEach-Object { Write-Host "  $($_.Name)" }

    - name: Configure TensorRT Paths
      shell: pwsh
      run: |
        $trtPkg = (Resolve-Path "tensorrt_pkg").Path

        # The PyPI tensorrt package has the SDK under tensorrt-<version>.data/
        $dataDir = Get-ChildItem -Path $trtPkg -Directory -Filter "tensorrt-*.data" | Select-Object -First 1
        if ($dataDir) {
          $trtHome = Join-Path $dataDir.FullName "data"
          if (-not (Test-Path (Join-Path $trtHome "lib"))) {
            # Try the data directory itself
            if (Test-Path (Join-Path $dataDir.FullName "lib")) {
              $trtHome = $dataDir.FullName
            }
          }
        }

        # Fallback: look for the tensorrt directory directly in the package
        if (-not $trtHome) {
          $trtDir = Get-ChildItem -Path $trtPkg -Directory -Filter "tensorrt" | Select-Object -First 1
          if ($trtDir) {
            $trtHome = $trtDir.FullName
          } else {
            $trtHome = $trtPkg
          }
        }

        Write-Host "TENSORRT_HOME=$trtHome"
        "TENSORRT_HOME=$trtHome" | Out-File -FilePath $env:GITHUB_ENV -Append
        "TENSORRT_PATH=$trtHome" | Out-File -FilePath $env:GITHUB_ENV -Append

        # List what we found for debugging
        if (Test-Path (Join-Path $trtHome "lib")) {
          Write-Host "TensorRT lib contents:"
          Get-ChildItem (Join-Path $trtHome "lib") | ForEach-Object { Write-Host "  $($_.Name)" }
        } else {
          Write-Warning "No lib directory found in $trtHome"
          Write-Host "Directory structure:"
          Get-ChildItem $trtPkg -Recurse -Depth 2 | Select-Object -First 30 | ForEach-Object { Write-Host "  $($_.FullName)" }
        }
        if (Test-Path (Join-Path $trtHome "include")) {
          Write-Host "TensorRT include contents:"
          Get-ChildItem (Join-Path $trtHome "include") | Select-Object -First 10 | ForEach-Object { Write-Host "  $($_.Name)" }
        }
