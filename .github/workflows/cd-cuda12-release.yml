name: CUDA12 Combined Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version override for all packages (SETUPTOOLS_SCM_PRETEND_VERSION)
        type: string
        required: true
      package:
        description: Package to build
        type: choice
        required: true
        options:
          - bm3dcuda
          - dfttest2_cuda
          - dfttest2_nvrtc
          - trt
          - trt-rtx
          - vsmlrt-cuda
      cuda-windows:
        description: CUDA version for Windows
        type: string
        required: false
        default: "12.9.2"
      tensorrt-windows:
        description: TensorRT version for Windows
        type: string
        required: false
        default: "11.1.0.106"
      tensorrt-rtx-windows:
        description: TensorRT-RTX version for Windows
        type: string
        required: false
        default: "1.5.0.114"
      windows-runner:
        description: Windows runner to use
        type: choice
        required: true
        default: windows-2022
        options:
          - windows-2022
          - windows-2025

jobs:
  build-bm3dcuda:
    if: inputs.package == 'bm3dcuda'
    uses: ./.github/workflows/pkg-bm3dcuda-cu12.yml
    with:
      version: ${{ inputs.version }}
      cuda-windows: ${{ inputs.cuda-windows }}
      windows-runner: ${{ inputs.windows-runner }}

  build-dfttest2-cuda:
    if: inputs.package == 'dfttest2_cuda'
    uses: ./.github/workflows/pkg-dfttest2_cuda-cu12.yml
    with:
      version: ${{ inputs.version }}
      cuda-windows: ${{ inputs.cuda-windows }}
      windows-runner: ${{ inputs.windows-runner }}

  build-dfttest2-nvrtc:
    if: inputs.package == 'dfttest2_nvrtc'
    uses: ./.github/workflows/pkg-dfttest2_nvrtc-cu12.yml
    with:
      version: ${{ inputs.version }}
      cuda-windows: ${{ inputs.cuda-windows }}
      windows-runner: ${{ inputs.windows-runner }}

  build-trt:
    if: inputs.package == 'trt'
    uses: ./.github/workflows/pkg-trt-cu12.yml
    with:
      version: ${{ inputs.version }}
      cuda-windows: ${{ inputs.cuda-windows }}
      tensorrt-windows: ${{ inputs.tensorrt-windows }}
      windows-runner: ${{ inputs.windows-runner }}

  build-trt-rtx:
    if: inputs.package == 'trt-rtx'
    uses: ./.github/workflows/pkg-trt-rtx-cu12.yml
    with:
      version: ${{ inputs.version }}
      cuda-windows: ${{ inputs.cuda-windows }}
      tensorrt-rtx-windows: ${{ inputs.tensorrt-rtx-windows }}
      windows-runner: ${{ inputs.windows-runner }}

  build-vsmlrt-cuda:
    if: inputs.package == 'vsmlrt-cuda'
    uses: ./.github/workflows/pkg-vsmlrt-cuda-cu12.yml
    with:
      version: ${{ inputs.version }}
      cuda-windows: ${{ inputs.cuda-windows }}
      tensorrt-windows: ${{ inputs.tensorrt-windows }}
      windows-runner: ${{ inputs.windows-runner }}

  create-release:
    name: Create CUDA12 Release
    needs: [build-bm3dcuda, build-dfttest2-cuda, build-dfttest2-nvrtc, build-trt, build-trt-rtx, build-vsmlrt-cuda]
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download all cu12 artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: "*-cu12*"
          path: dist
          merge-multiple: true

      - name: Remove metadata.json files
        run: rm -f dist/metadata.json

      - name: List all release assets
        run: |
          echo "=== Release assets ==="
          ls -la dist/

      - name: Determine version
        id: version
        run: |
          WHEEL=$(ls dist/*.whl 2>/dev/null | head -1)
          if [ -n "$WHEEL" ]; then
            VERSION=$(basename "$WHEEL" | sed 's/^[^-]*-\([^-]*\)-.*/\1/')
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
            echo "Detected version: $VERSION"
          else
            echo "version=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
            echo "Using input version: ${{ inputs.version }}"
          fi

      - name: Determine package name
        id: package
        run: |
          case "${{ inputs.package }}" in
            bm3dcuda)
              echo "package_name=bm3dcuda" >> "$GITHUB_OUTPUT"
              echo "display_name=BM3DCUDA" >> "$GITHUB_OUTPUT"
              ;;
            dfttest2_cuda)
              echo "package_name=dfttest2_cuda" >> "$GITHUB_OUTPUT"
              echo "display_name=DFTTest2 CUDA" >> "$GITHUB_OUTPUT"
              ;;
            dfttest2_nvrtc)
              echo "package_name=dfttest2_nvrtc" >> "$GITHUB_OUTPUT"
              echo "display_name=DFTTest2 NVRTC" >> "$GITHUB_OUTPUT"
              ;;
            trt)
              echo "package_name=mlrt-trt" >> "$GITHUB_OUTPUT"
              echo "display_name=MLRT TensorRT" >> "$GITHUB_OUTPUT"
              ;;
            trt-rtx)
              echo "package_name=mlrt-trt-rtx" >> "$GITHUB_OUTPUT"
              echo "display_name=MLRT TensorRT-RTX" >> "$GITHUB_OUTPUT"
              ;;
            vsmlrt-cuda)
              echo "package_name=vsmlrt-cuda" >> "$GITHUB_OUTPUT"
              echo "display_name=VSMLRT CUDA" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Create release and upload assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: "vapoursynth-${{ steps.package.outputs.package_name }}-cuda12-${{ steps.version.outputs.version }}"
          name: "VapourSynth ${{ steps.package.outputs.display_name }} CUDA 12 ${{ steps.version.outputs.version }}"
          files: dist/*
          body: |
            CUDA 12 alternative build for Windows.

            **Package:** ${{ steps.package.outputs.display_name }}
            **Version:** ${{ steps.version.outputs.version }}
            **CUDA version:** ${{ inputs.cuda-windows }}
            **TensorRT version:** ${{ inputs.tensorrt-windows }}
            **TensorRT-RTX version:** ${{ inputs.tensorrt-rtx-windows }}

            ## Contents
            The `.whl` wheel with bundled CUDA and TensorRT runtime DLLs.
          fail_on_unmatched_files: true
          generate_release_notes: false
