name: Upload Release

on:
  workflow_call:
    inputs:
      wheel-pattern:
        description: Pattern for wheel artifacts
        type: string
        required: true
      sdist-name:
        description: Name for sdist artifact
        type: string
        required: true
      display-name:
        description: Name used for release tag and title (e.g., vapoursynth-fmtconv)
        type: string
        required: true
      upload-hf:
        description: Upload to Hugging Face bucket
        type: boolean
        required: false
        default: false
      tag-suffix:
        description: Optional suffix appended to the release tag (e.g., "-cuda12" for CUDA 12 builds)
        type: string
        required: false
        default: ""

jobs:
  upload:
    name: Upload to GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Download wheels
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          pattern: ${{ inputs.wheel-pattern }}
          path: dist
          merge-multiple: true

      - name: Download sdist
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: ${{ inputs.sdist-name }}
          path: dist

      - name: Determine version
        id: version
        run: |
          WHEEL=$(ls dist/*.whl | head -1)
          VERSION=$(basename "$WHEEL" | sed 's/^[^-]*-\([^-]*\)-.*/\1/')
          TAG="${{ inputs.display-name }}-v$VERSION${{ inputs.tag-suffix }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Detected version: $VERSION"
          echo "Release tag: $TAG"

      - name: Generate PEP 658 metadata
        run: python scripts/generate_metadata.py

      - name: Create release and upload assets
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ inputs.display-name }} ${{ steps.version.outputs.version }}${{ inputs.tag-suffix }}
          files: dist/*
          body: ${{ inputs.display-name }} ${{ steps.version.outputs.version }}${{ inputs.tag-suffix }}
          fail_on_unmatched_files: true
          generate_release_notes: false

  # upload-bucket:
  #   name: Upload to HuggingFace Bucket
  #   needs: upload
  #   if: ${{ inputs.upload-hf }}
  #   permissions:
  #     id-token: write
  #     contents: read
  #   uses: ./.github/workflows/cd-upload-bucket.yml
  #   with:
  #     wheel-pattern: ${{ inputs.wheel-pattern }}
  #     sdist-name: ${{ inputs.sdist-name }}

  trigger-index:
    name: Trigger Index Update
    # needs: [upload, upload-bucket]
    needs: [upload]
    if: ${{ always() && !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Trigger index update
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh api repos/$GH_REPO/dispatches -f event_type=index
