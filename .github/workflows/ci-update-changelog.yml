name: Update Changelog

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: read
  pull-requests: write

jobs:
  update:
    name: Update Changelog
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Download metadata artifacts
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./scripts/Download-Metadata.ps1

      - name: Merge JSONs and Generate Markdown
        run: python scripts/generate_changelog.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "Auto-update changelog"
          title: "Auto-update changelog"
          body: "This is an automated PR to update the CHANGELOG.md and changelog.json files."
          branch: "update-changelog"
          delete-branch: true
          add-paths: |
            CHANGELOG.md
            changelog.json
