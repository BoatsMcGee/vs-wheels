name: MLRT-NCNN

on:
  push:
    branches:
      - master
    paths:
      - vsmlrt/ncnn/**
      - .github/workflows/ncnn.yml
  pull_request:
    paths:
      - vsmlrt/ncnn/**
      - .github/workflows/ncnn.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_NCNN)
        type: string
        required: false
      onnx-windows-tag:
        description: ONNX tag for Windows (https://github.com/onnx/onnx)
        type: string
        required: false
        default: "v1.19.0"
      onnx-linux-tag:
        description: ONNX tag for Linux (https://github.com/onnx/onnx)
        type: string
        required: false
        default: "v1.19.0"
      ncnn-windows-tag:
        description: NCNN tag for Windows (https://github.com/Tencent/ncnn)
        type: string
        required: false
        default: "86efe80b50408bfeca79761edcb3fa4b4e513331"
      ncnn-linux-tag:
        description: NCNN tag for Linux (https://github.com/Tencent/ncnn)
        type: string
        required: false
        default: "20250503"
      vulkan-windows-version:
        description: Vulkan version for Windows (https://vulkan.lunarg.com/sdk/home)
        type: string
        required: false
        default: "1.4.321.1"
      vulkan-linux-version:
        description: Vulkan version for Linux (ARM64 only) (https://vulkan.lunarg.com/sdk/home)
        type: string
        required: false
        default: "1.4.321.1"
      vulkan-macos-version:
        description: Vulkan version for macOS (https://vulkan.lunarg.com/sdk/home)
        type: string
        required: false
        default: "1.4.350.0"
  merge_group:

env:
  ONNX_WINDOWS_TAG: ${{ inputs.onnx-windows-tag || 'v1.19.0' }}
  ONNX_LINUX_TAG: ${{ inputs.onnx-linux-tag || 'v1.19.0' }}
  NCNN_WINDOWS_TAG: ${{ inputs.ncnn-windows-tag || '86efe80b50408bfeca79761edcb3fa4b4e513331' }}
  NCNN_LINUX_TAG: ${{ inputs.ncnn-linux-tag || '20250503' }}
  VULKAN_WINDOWS_VERSION: ${{ inputs.vulkan-windows-version || '1.4.321.1' }}
  VULKAN_LINUX_VERSION: ${{ inputs.vulkan-linux-version || '1.4.321.1' }}
  VULKAN_MACOS_VERSION: ${{ inputs.vulkan-macos-version || '1.4.350.0' }}
  PACKAGE_NAME: ncnn

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
          - name: Linux ARM64
            os: ubuntu-24.04-arm
          - name: Windows x64
            os: windows-2025
          - name: macOS ARM64
            os: macos-15

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt
          vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc

      - name: Build ONNX dependency (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-onnx-windows
        with:
          onnx-tag: ${{ env.ONNX_WINDOWS_TAG }}

      - name: Build ONNX dependency (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-onnx-linux
        with:
          onnx-tag: ${{ env.ONNX_LINUX_TAG }}

      - name: Build ONNX dependency (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-onnx-macos
        with:
          onnx-tag: ${{ env.ONNX_LINUX_TAG }}

      - name: Build NCNN dependency (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-ncnn-windows
        with:
          ncnn-tag: ${{ env.NCNN_WINDOWS_TAG }}
          vulkan-version: ${{ env.VULKAN_WINDOWS_VERSION }}

      - name: Download NCNN dependency (Linux x64)
        if: runner.os == 'Linux' && runner.arch == 'x64'
        shell: bash
        run: |
          curl -s -o ncnn-dist.zip -LJO \
            https://github.com/Tencent/ncnn/releases/download/${{ env.NCNN_LINUX_TAG }}/ncnn-${{ env.NCNN_LINUX_TAG }}-ubuntu-2404.zip
          unzip -q ncnn-dist.zip -d ncnn-dist
          ncnnRoot=$(realpath ncnn-dist)
          echo "CMAKE_PREFIX_PATH=$ncnnRoot${CMAKE_PREFIX_PATH:+:$CMAKE_PREFIX_PATH}" >> $GITHUB_ENV

      - name: Build NCNN dependency (ARM64)
        if: runner.os == 'Linux' && runner.arch == 'ARM64'
        uses: ./.github/actions/setup-ncnn-linux
        with:
          ncnn-tag: ${{ env.NCNN_LINUX_TAG }}
          vulkan-version: ${{ env.VULKAN_LINUX_VERSION }}

      - name: Build NCNN dependency (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-ncnn-macos
        with:
          ncnn-tag: ${{ env.NCNN_LINUX_TAG }}
          vulkan-version: ${{ env.VULKAN_MACOS_VERSION }}

      - name: Build wheel
        run: uv build --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_NCNN: ${{ inputs.version }}

      - name: Repair wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          uvx --with patchelf auditwheel repair --exclude libvulkan.so.* --strip dist/*.whl -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

      - name: Repair wheel (macOS)
        if: runner.os == 'macOS'
        run: |
          uvx --from delocate delocate-wheel -v dist/*.whl -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/
          uvx --from delocate delocate-listdeps dist/*.whl

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-wheels-${{ matrix.name }}
          path: ./dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt
          vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_NCNN: ${{ inputs.version }}

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-sdist
          path: dist/*.tar.gz

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run publish.yml
          -f artifact-pattern=ncnn-*
          -f package=vapoursynth-ncnn
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
