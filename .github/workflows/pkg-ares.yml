name: ARES

on:
  push:
    branches:
      - master
    paths:
      - ares/**
      - .github/workflows/pkg-ares.yml
  pull_request:
    paths:
      - ares/**
      - .github/workflows/pkg-ares.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_ARES)
        type: string
        required: false

env:
  PACKAGE_NAME: ares

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
          - name: Linux aarch64
            os: ubuntu-24.04-arm
          - name: Windows x64
            os: windows-2025-vs2026
          - name: macOS x64
            os: macos-26-intel
          - name: macOS ARM64
            os: macos-26

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          ${{ env.PACKAGE_NAME }}/ares

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc

      - name: Build wheels
        uses: pypa/cibuildwheel@f03ac7617d6cff873ccf24cc0d567ef5ba5a9e6d # v4.0.0
        with:
          package-dir: ${{ env.PACKAGE_NAME }}
        env:
          CIBW_ENVIRONMENT: SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_ARES="${{ inputs.version }}"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-wheels-${{ matrix.name }}
          path: ./wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          ${{ env.PACKAGE_NAME }}/ares

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_ARES: ${{ inputs.version }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-sdist
          path: dist/*.tar.gz

      - name: Generate metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        run: |
          VERSION=$(uvx pkginfo dist/*.tar.gz | grep "^version:" | cut -d' ' -f2)
          cat << EOF > metadata.json
          {
            "package": "vapoursynth-${{ env.PACKAGE_NAME }}",
            "version": "$VERSION"
          }
          EOF

      - name: Upload metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-metadata
          path: metadata.json

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run cd-publish.yml
          -f artifact-pattern=${{ env.PACKAGE_NAME }}-*
          -f package=vapoursynth-${{ env.PACKAGE_NAME }}
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
