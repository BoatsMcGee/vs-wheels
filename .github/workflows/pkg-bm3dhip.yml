name: BM3DHIP

on:
  push:
    branches:
      - master
    paths:
      - bm3dcuda/bm3dhip/**
      - .github/workflows/pkg-bm3dhip.yml
      - .github/actions/setup-hip-linux/**
      - .github/actions/setup-hip-windows/**
  pull_request:
    paths:
      - bm3dcuda/bm3dhip/**
      - .github/workflows/pkg-bm3dhip.yml
      - .github/actions/setup-hip-linux/**
      - .github/actions/setup-hip-windows/**
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_BM3DHIP)
        type: string
        required: false
      hip-linux:
        description: HIP version for Linux (7.0, 7.2.3)
        type: string
        required: false
        default: "7.2.4" # renovate: datasource=custom.rocm-linux depName=rocm-linux
      hip-windows:
        description: HIP version for Windows (e.g., 25.Q3 -> 6.4.2 | 26.Q1 -> 7.1.1)
        type: choice
        required: true
        options:
          - 26.Q1-Win11
          - 25.Q3-WinSvr2022
      windows-runner:
        description: Windows runner to use
        type: choice
        required: true
        default: windows-2025-vs2026
        options:
          - windows-2025-vs2026
          - windows-2025
          - windows-2022

env:
  HIP_LINUX: ${{ inputs.hip-linux || '7.2.4' }} # renovate: datasource=custom.rocm-linux depName=rocm-linux
  HIP_WINDOWS: ${{ inputs.hip-windows || '26.Q1-Win11' }}
  PACKAGE_NAME: bm3dhip

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            arch: x86_64
            container: quay.io/pypa/manylinux_2_28_x86_64
          - os: ${{ inputs.windows-runner || 'windows-2025-vs2026' }}
            arch: amd64

    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          # Workaround for Linux containers
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive bm3dcuda/${{ env.PACKAGE_NAME }}/VapourSynth-BM3DCUDA bm3dcuda/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Setup HIP (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-hip-linux
        with:
          hip-version: ${{ env.HIP_LINUX }}
          hip-components: hip-devel, hip-runtime-amd, rocm-device-libs, libxml2, libstdc++-devel

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc

      - name: Setup HIP (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-hip-windows
        with:
          hip-version: ${{ env.HIP_WINDOWS }}
          cache-key: ${{ matrix.os }}

      - name: Build wheels
        run: uv build --wheel --package vapoursynth-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_BM3DHIP: ${{ inputs.version }}

      - name: Repair wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          uvx --with patchelf auditwheel repair --strip dist/*.whl -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          bm3dcuda/${{ env.PACKAGE_NAME }}/VapourSynth-BM3DCUDA
          bm3dcuda/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_BM3DHIP: ${{ inputs.version }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-sdist
          path: dist/*.tar.gz

      - name: Generate metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        run: |
          VERSION=$(uvx pkginfo dist/*.tar.gz | grep "^version:" | cut -d' ' -f2)
          cat << EOF > metadata.json
          {
            "package": "${{ env.PACKAGE_NAME }}",
            "version": "$VERSION",
            "hip_linux": "${{ env.HIP_LINUX }}",
            "hip_windows": "${{ env.HIP_WINDOWS }}"
          }
          EOF

      - name: Upload metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-metadata
          path: metadata.json

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run cd-publish.yml
          -f artifact-pattern=${{ env.PACKAGE_NAME }}-*
          -f package=vapoursynth-${{ env.PACKAGE_NAME }}
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
