name: DFTTEST2_CUDA-CU12

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_DFTTEST2_CUDA)
        type: string
        required: false
      cuda-windows:
        description: CUDA version for Windows
        type: string
        required: false
        default: "12.9.2"
      windows-runner:
        description: Windows runner to use
        type: choice
        required: true
        default: windows-2022
        options:
          - windows-2022
          - windows-2025
  workflow_call:
    inputs:
      version:
        type: string
        required: false
      cuda-windows:
        type: string
        required: false
        default: "12.9.2"
      windows-runner:
        type: string
        required: false
        default: "windows-2022"

env:
  CUDA_WINDOWS: ${{ inputs.cuda-windows || '12.9.2' }}
  PACKAGE_NAME: dfttest2_cuda

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ${{ inputs.windows-runner || 'windows-2022' }}
            arch: amd64

    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git submodule update --init --recursive dfttest2/${{ env.PACKAGE_NAME }}/vs-dfttest2 dfttest2/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Setup MSVC
        uses: ./.github/actions/setup-msvc

      - name: Setup CUDA (Windows)
        uses: ./.github/actions/setup-cuda-windows-cu12
        with:
          cuda-version: ${{ env.CUDA_WINDOWS }}
          cache-key: ${{ matrix.os }}

      - name: Build wheels
        run: uv build --package vapoursynth-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_DFTTEST2_CUDA: ${{ inputs.version }}

      - name: Extract DLL from wheel and copy CUDA dependencies (Windows)
        shell: pwsh
        run: |
          $whl = Get-ChildItem -Path dist/*.whl | Select-Object -First 1
          $extractDir = "wheel_extracted"
          Expand-Archive -LiteralPath $whl.FullName -DestinationPath $extractDir -Force
          Get-ChildItem -Path $extractDir -Recurse -Filter "*.dll" | ForEach-Object {
            Copy-Item $_.FullName -Destination dist/ -Force
            Write-Host "Extracted DLL: $($_.Name)"
          }
          $cudaBin = "$env:CUDA_PATH\bin"
          if (Test-Path $cudaBin) {
            foreach ($dll in @("cufft64_12.dll", "nvrtc64_12.dll", "nvJitLink64_12.dll", "nvptxcompiler64_12.dll", "cuinins64_12.dll")) {
              if (Test-Path "$cudaBin\$dll") {
                Copy-Item "$cudaBin\$dll" -Destination dist/ -Force
                Write-Host "Copied $dll"
              }
            }
          }
          Remove-Item -Recurse -Force $extractDir

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-wheels-${{ matrix.os }}-${{ matrix.arch }}-cu12
          path: dist/*

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: git submodule update --init --recursive dfttest2/${{ env.PACKAGE_NAME }}/vs-dfttest2 dfttest2/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_DFTTEST2_CUDA: ${{ inputs.version }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-sdist-cu12
          path: dist/*.tar.gz
