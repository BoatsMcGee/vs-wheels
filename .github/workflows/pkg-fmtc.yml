name: FMTC

on:
  push:
    branches:
      - master
    paths:
      - fmtc/**
      - .github/workflows/pkg-fmtc.yml
  pull_request:
    paths:
      - fmtc/**
      - .github/workflows/pkg-fmtc.yml
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION)
        type: string
        required: false

env:
  PACKAGE_NAME: fmtc

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            name: Linux x64
          - os: ubuntu-24.04-arm
            name: Linux ARM
          - os: windows-2025-vs2026
            name: Windows x64
          - os: macos-26
            name: macOS ARM64
          - os: macos-26-intel
            name: macOS x64

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: git submodule update --init --recursive ${{ env.PACKAGE_NAME }}/fmtconv

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build wheels
        uses: pypa/cibuildwheel@294735312765b09d24a2fbec22660ce817587d55 # v4.1
        with:
          package-dir: ${{ env.PACKAGE_NAME }}
          output-dir: wheelhouse
        env:
          CIBW_ENVIRONMENT: SETUPTOOLS_SCM_PRETEND_VERSION=${{ inputs.version }}

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-wheels-${{ matrix.name }}
          path: wheelhouse/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: git submodule update --init --recursive ${{ env.PACKAGE_NAME }}/fmtconv

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-fmtconv
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION: ${{ inputs.version }}

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fmtconv-sdist
          path: dist/*.tar.gz

      - name: Generate metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish
        run: |
          VERSION=$(uvx pkginfo dist/*.tar.gz | grep "^version:" | cut -d' ' -f2)
          cat << EOF > metadata.json
          {
            "package": "vapoursynth-fmtconv",
            "version": "$VERSION",
            "notes": "Available for Windows, Linux, and macOS"
          }
          EOF

      - name: Upload metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: fmtconv-metadata
          path: metadata.json

  upload-release:
    name: Upload to GitHub Release
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    permissions:
      contents: write
    uses: ./.github/workflows/cd-upload-release.yml
    with:
      wheel-pattern: fmtc-wheels-*
      sdist-name: fmtconv-sdist
      display-name: vapoursynth-fmtconv
