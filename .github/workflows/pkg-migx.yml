name: MLRT-MIGX

on:
  push:
    branches:
      - master
    paths:
      - vsmlrt/migx/**
      - .github/workflows/pkg-migx.yml
      - .github/actions/setup-hip-linux/**
  pull_request:
    paths:
      - vsmlrt/migx/**
      - .github/workflows/pkg-migx.yml
      - .github/actions/setup-hip-linux/**
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_MIGX)
        type: string
        required: false
      hip-linux:
        description: HIP/ROCm version for Linux (7.2.3, 6.3.1)
        type: string
        required: false
        default: "7.2.3" # renovate: datasource=custom.rocm-linux depName=rocm-linux

env:
  HIP_LINUX: ${{ inputs.hip-linux || '7.2.3' }} # renovate: datasource=custom.rocm-linux depName=rocm-linux
  PACKAGE_NAME: migx

jobs:
  build-wheels:
    name: Build wheels on Linux x64
    runs-on: ubuntu-latest
    container: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          # Workaround for Linux containers
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Install build tools (Linux)
        run: |
          uv tool install cmake
          uv tool install ninja

      - name: Setup HIP and MIGraphX (Linux)
        uses: ./.github/actions/setup-hip-linux
        with:
          hip-version: ${{ env.HIP_LINUX }}
          hip-components: >-
            hip-devel,
            hip-runtime-amd,
            rocm-device-libs,
            migraphx-devel,
            miopen-hip-devel,
            rocblas-devel,
            hipblaslt-devel,
            hsa-rocr-devel,
            libxml2,
            libstdc++-devel

      - name: Build wheels
        run: uv build --wheel --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_MIGX: ${{ inputs.version }}

      - name: Repair wheel (Linux)
        run: |
          uvx --with patchelf auditwheel repair \
            --exclude libmigraphx_c.so \
            --exclude libmigraphx_c.so.* \
            --exclude libamdhip64.so \
            --exclude libamdhip64.so.* \
            --strip dist/*.whl -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

      - name: Upload wheels
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-wheels-linux-x86_64
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt
          vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_MIGX: ${{ inputs.version }}

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-sdist
          path: dist/*.tar.gz

      - name: Generate metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        run: |
          VERSION=$(uvx pkginfo dist/*.tar.gz | grep "^version:" | cut -d' ' -f2)
          cat << EOF > metadata.json
          {
            "package": "${{ env.PACKAGE_NAME }}",
            "version": "$VERSION",
            "hip_linux": "${{ env.HIP_LINUX }}"
          }
          EOF

      - name: Upload metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-metadata
          path: metadata.json

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run cd-publish.yml
          -f artifact-pattern=${{ env.PACKAGE_NAME }}-*
          -f package=vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
