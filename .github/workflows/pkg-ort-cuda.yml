name: MLRT-ORT-CUDA

on:
  push:
    branches:
      - master
    paths:
      - vsmlrt/ort/**
      - .github/workflows/pkg-ort-cuda.yml
      - .github/actions/setup-cuda-*/
      - .github/actions/setup-cudnn-*/
      - .github/actions/setup-onnx-*/
      - .github/actions/setup-onnxruntime-*/
      - .github/cmake-cache/onnxruntime-*/
  pull_request:
    paths:
      - vsmlrt/ort/**
      - .github/workflows/pkg-ort-cuda.yml
      - .github/actions/setup-cuda-*/
      - .github/actions/setup-cudnn-*/
      - .github/actions/setup-onnx-*/
      - .github/actions/setup-onnxruntime-*/
      - .github/cmake-cache/onnxruntime-*/
  schedule:
    - cron: 55 3 3-30/4 * *
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_ORT_CUDA)
        type: string
        required: false
      onnxruntime-windows-tag:
        description: ONNX tag for Windows (https://github.com/microsoft/onnxruntime)
        type: string
        required: false
        default: "v1.26.0" # renovate: datasource=github-tags depName=microsoft/onnxruntime
      onnxruntime-linux-tag:
        description: ONNX tag for Linux (https://github.com/microsoft/onnxruntime)
        type: string
        required: false
        default: "v1.26.0" # renovate: datasource=github-tags depName=microsoft/onnxruntime
      cuda-windows:
        description: CUDA version for Windows (https://developer.nvidia.com/cuda-toolkit-archive)
        type: string
        required: false
        default: "13.0.3"
      cuda-linux:
        description: CUDA version for Linux (https://developer.nvidia.com/cuda-toolkit-archive)
        type: string
        required: false
        default: "13.0"
      cudnn-windows:
        description: cuDNN version for Windows (https://developer.nvidia.com/cudnn-downloads, https://developer.nvidia.com/cudnn-archive)
        type: string
        required: false
        default: "9.23.2.1" # renovate: datasource=pypi depName=nvidia-cudnn-cu13
      cudnn-linux:
        description: cuDNN version for Linux (https://developer.nvidia.com/cudnn-downloads, https://developer.nvidia.com/cudnn-archive)
        type: string
        required: false
        default: "9.23.2.1" # renovate: datasource=pypi depName=nvidia-cudnn-cu13

env:
  ONNXRUNTIME_WINDOWS_TAG: ${{ inputs.onnxruntime-windows-tag || 'v1.26.0' }} # renovate: datasource=github-tags depName=microsoft/onnxruntime
  ONNXRUNTIME_LINUX_TAG: ${{ inputs.onnxruntime-linux-tag || 'v1.26.0' }} # renovate: datasource=github-tags depName=microsoft/onnxruntime
  CUDA_WINDOWS_VERSION: ${{ inputs.cuda-windows || '13.0.3' }}
  CUDA_LINUX_VERSION: ${{ inputs.cuda-linux || '13.0' }}
  CUDNN_WINDOWS_VERSION: ${{ inputs.cudnn-windows || '9.23.2.1' }} # renovate: datasource=pypi depName=nvidia-cudnn-cu13
  CUDNN_LINUX_VERSION: ${{ inputs.cudnn-linux || '9.23.2.1' }} # renovate: datasource=pypi depName=nvidia-cudnn-cu13
  PACKAGE_NAME: ort

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64 CUDA
            os: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
            cuda_repo: rhel8/x86_64
          - name: Windows x64 CUDA
            os: windows-2022

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Update pyproject for CUDA build
        run: uv run --script vsmlrt/ort/scripts/cuda_pyproject.py vsmlrt/ort/pyproject.toml

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          uv tool install cmake
          uv tool install ninja
          uv tool install auditwheel
          uv tool install patchelf
          uv tool install wheel

      - name: Build ONNX Runtime dependency (Windows)
        if: runner.os == 'Windows'
        id: setup-onnxruntime-windows
        uses: ./.github/actions/setup-onnxruntime-windows
        with:
          onnxruntime-tag: ${{ env.ONNXRUNTIME_WINDOWS_TAG }}
          build-cuda: true
          cuda-version: ${{ env.CUDA_WINDOWS_VERSION }}
          cudnn-version: ${{ env.CUDNN_WINDOWS_VERSION }}
          os: ${{ matrix.container || matrix.os }}

      - name: Build ONNX Runtime dependency (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-onnxruntime-linux
        with:
          onnxruntime-tag: ${{ env.ONNXRUNTIME_LINUX_TAG }}
          build-cuda: true
          cuda-version: ${{ env.CUDA_LINUX_VERSION }}
          cuda-repo: ${{ matrix.cuda_repo }}
          cudnn-version: ${{ env.CUDNN_LINUX_VERSION }}
          os: ${{ matrix.container || matrix.os }}

      - name: Get ONNX version from ONNX Runtime
        id: get-onnx-version
        shell: bash
        run: |
          git -C onnxruntime/cmake/external/onnx/ fetch --tags --depth=1 2>/dev/null || true
          version=$(git -C onnxruntime/cmake/external/onnx/ describe --exact-match --tags 2>/dev/null || git -C onnxruntime/cmake/external/onnx/ rev-parse HEAD)
          echo "version=$version" | tee -a $GITHUB_OUTPUT

      - name: Build ONNX dependency (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-onnx-windows
        with:
          onnx-tag: ${{ steps.get-onnx-version.outputs.version }}
          os: ${{ matrix.container || matrix.os }}

      - name: Build ONNX dependency (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-onnx-linux
        with:
          onnx-tag: ${{ steps.get-onnx-version.outputs.version }}
          os: ${{ matrix.container || matrix.os }}

      - name: Build wheel
        run: uv build --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}-cuda
        env:
          DML_DIR: ${{ steps.setup-onnxruntime-windows.outputs.dml-path }}
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_ORT_CUDA: ${{ inputs.version }}

      - name: Repair wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          auditwheel repair \
            --exclude libonnxruntime.so* \
            --exclude libonnxruntime_providers_cuda.so* \
            --exclude libonnxruntime_providers_shared.so* \
            --exclude libcudnn.so* \
            --exclude libcudnn_*.so* \
            --exclude libcublas.so* \
            --exclude libcublasLt.so* \
            --exclude libcudart.so* \
            --exclude libcufft.so* \
            --exclude libcurand.so* \
            --strip dist/*.whl \
            -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

          # Fix RPATH for all bundled libraries in the repaired wheel to ensure they find each other via $ORIGIN
          echo "=== Patching RPATHs inside repaired wheel ==="
          wheel unpack dist/*.whl
          UNPACKED_DIR=$(ls -d vapoursynth_mlrt_ort_cuda-*)
          for f in "$UNPACKED_DIR"/vapoursynth/plugins/ort-cuda/*.so*; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              echo "Setting RPATH on: $(basename "$f")"
              patchelf --set-rpath '$ORIGIN:$ORIGIN/../../../nvidia/cu13/lib:$ORIGIN/../../../nvidia/cudnn/lib' "$f"
            fi
          done
          echo "Repacking wheel..."
          rm dist/*.whl
          wheel pack "$UNPACKED_DIR" -d dist/
          rm -rf "$UNPACKED_DIR"

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-cuda-wheels-${{ matrix.name }}
          path: ./dist/*.whl

  # No CUDA 12 support on ARM64
  build-wheels-arm64:
    if: ${{ !startsWith(inputs.cuda-linux, '12') }}
    name: Build wheels on Linux ARM64 CUDA
    runs-on: ubuntu-24.04-arm
    container: quay.io/pypa/manylinux_2_28_aarch64

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Update pyproject for CUDA build
        run: uv run --script vsmlrt/ort/scripts/cuda_pyproject.py vsmlrt/ort/pyproject.toml

      - name: Install build tools (Linux)
        run: |
          uv tool install cmake
          uv tool install ninja
          uv tool install auditwheel
          uv tool install patchelf
          uv tool install wheel

      - name: Build ONNX Runtime dependency (Linux)
        uses: ./.github/actions/setup-onnxruntime-linux
        with:
          onnxruntime-tag: ${{ env.ONNXRUNTIME_LINUX_TAG }}
          build-cuda: true
          cuda-version: ${{ env.CUDA_LINUX_VERSION }}
          cuda-repo: rhel8/sbsa
          cudnn-version: ${{ env.CUDNN_LINUX_VERSION }}
          os: ${{ matrix.container || matrix.os }}

      - name: Get ONNX version from ONNX Runtime
        id: get-onnx-version
        shell: bash
        run: |
          git -C onnxruntime/cmake/external/onnx/ fetch --tags --depth=1 2>/dev/null || true
          version=$(git -C onnxruntime/cmake/external/onnx/ describe --exact-match --tags 2>/dev/null || git -C onnxruntime/cmake/external/onnx/ rev-parse HEAD)
          echo "version=$version" | tee -a $GITHUB_OUTPUT

      - name: Build ONNX dependency (Linux)
        uses: ./.github/actions/setup-onnx-linux
        with:
          onnx-tag: ${{ steps.get-onnx-version.outputs.version }}
          os: ${{ matrix.container || matrix.os }}

      - name: Build wheel
        run: uv build --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}-cuda
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_ORT_CUDA: ${{ inputs.version }}

      - name: Repair wheel (Linux)
        run: |
          auditwheel repair \
            --exclude libonnxruntime.so* \
            --exclude libonnxruntime_providers_cuda.so* \
            --exclude libonnxruntime_providers_shared.so* \
            --exclude libcudnn.so* \
            --exclude libcudnn_*.so* \
            --exclude libcublas.so* \
            --exclude libcublasLt.so* \
            --exclude libcudart.so* \
            --exclude libcufft.so* \
            --exclude libcurand.so* \
            --strip dist/*.whl \
            -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

          # Fix RPATH for all bundled libraries in the repaired wheel to ensure they find each other via $ORIGIN
          echo "=== Patching RPATHs inside repaired wheel ==="
          wheel unpack dist/*.whl
          UNPACKED_DIR=$(ls -d vapoursynth_mlrt_ort_cuda-*)
          for f in "$UNPACKED_DIR"/vapoursynth/plugins/ort-cuda/*.so*; do
            if [ -f "$f" ] && [ ! -L "$f" ]; then
              echo "Setting RPATH on: $(basename "$f")"
              patchelf --set-rpath '$ORIGIN:$ORIGIN/../../../nvidia/cu13/lib:$ORIGIN/../../../nvidia/cudnn/lib' "$f"
            fi
          done
          echo "Repacking wheel..."
          rm dist/*.whl
          wheel pack "$UNPACKED_DIR" -d dist/
          rm -rf "$UNPACKED_DIR"

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-cuda-wheels-Linux ARM64 CUDA
          path: ./dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt
          vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Update pyproject for CUDA build
        run: uv run --script vsmlrt/ort/scripts/cuda_pyproject.py vsmlrt/ort/pyproject.toml

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}-cuda
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_ORT_CUDA: ${{ inputs.version }}

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-cuda-sdist
          path: dist/*.tar.gz

      - name: Generate metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        run: |
          VERSION=$(uvx pkginfo dist/*.tar.gz | grep "^version:" | cut -d' ' -f2)
          cat << EOF > metadata.json
          {
            "package": "vapoursynth-mlrt-${{ env.PACKAGE_NAME }}-cuda",
            "version": "$VERSION",
            "onnxruntime_windows": "${{ env.ONNXRUNTIME_WINDOWS_TAG }}",
            "onnxruntime_linux": "${{ env.ONNXRUNTIME_LINUX_TAG }}",
            "cuda_windows": "${{ env.CUDA_WINDOWS_VERSION }}",
            "cuda_linux": "${{ env.CUDA_LINUX_VERSION }}",
            "cudnn_windows": "${{ env.CUDNN_WINDOWS_VERSION }}",
            "cudnn_linux": "${{ env.CUDNN_LINUX_VERSION }}"
          }
          EOF

      - name: Upload metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-metadata
          path: metadata.json

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-wheels-arm64, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run cd-publish.yml
          -f artifact-pattern=${{ env.PACKAGE_NAME }}-cuda-*
          -f package=vapoursynth-mlrt-${{ env.PACKAGE_NAME }}-cuda
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
