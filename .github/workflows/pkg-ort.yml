name: MLRT-ORT

on:
  push:
    branches:
      - master
    paths:
      - vsmlrt/ort/**
      - .github/workflows/pkg-ort.yml
      - .github/actions/setup-onnx-*/**
      - .github/actions/setup-onnxruntime-*/**
      - .github/cmake-cache/onnx-*/**
      - .github/cmake-cache/onnxruntime-*/**
  pull_request:
    paths:
      - vsmlrt/ort/**
      - .github/workflows/pkg-ort.yml
      - .github/actions/setup-onnx-*/**
      - .github/actions/setup-onnxruntime-*/**
      - .github/cmake-cache/onnx-*/**
      - .github/cmake-cache/onnxruntime-*/**
  schedule:
    - cron: 39 4 2-30/4 * *
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_ORT)
        type: string
        required: false
      onnxruntime-windows-tag:
        description: ONNX tag for Windows (https://github.com/microsoft/onnxruntime)
        type: string
        required: false
        default: "v1.26.0"
      onnxruntime-linux-tag:
        description: ONNX tag for Linux (https://github.com/microsoft/onnxruntime)
        type: string
        required: false
        default: "v1.26.0"
      onnxruntime-macos-tag:
        description: ONNX tag for macOS (https://github.com/microsoft/onnxruntime)
        type: string
        required: false
        default: "v1.26.0"

env:
  ONNXRUNTIME_WINDOWS_TAG: ${{ inputs.onnxruntime-windows-tag || 'v1.26.0' }}
  ONNXRUNTIME_LINUX_TAG: ${{ inputs.onnxruntime-linux-tag || 'v1.26.0' }}
  ONNXRUNTIME_MACOS_TAG: ${{ inputs.onnxruntime-macos-tag || 'v1.26.0' }}
  PACKAGE_NAME: ort

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            container: quay.io/pypa/manylinux_2_28_aarch64
          - name: Windows x64
            os: windows-2022
          - name: macOS ARM64
            os: macos-15
          - name: macOS x64
            os: macos-15-intel

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          uv tool install cmake
          uv tool install ninja

      - name: Build ONNX Runtime dependency (Windows)
        if: runner.os == 'Windows'
        id: setup-onnxruntime-windows
        uses: ./.github/actions/setup-onnxruntime-windows
        with:
          onnxruntime-tag: ${{ env.ONNXRUNTIME_WINDOWS_TAG }}
          os: ${{ matrix.os }}

      - name: Build ONNX Runtime dependency (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-onnxruntime-linux
        with:
          onnxruntime-tag: ${{ env.ONNXRUNTIME_LINUX_TAG }}
          os: ${{ matrix.container || matrix.os }}

      - name: Build ONNX Runtime dependency (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-onnxruntime-macos
        with:
          onnxruntime-tag: ${{ env.ONNXRUNTIME_MACOS_TAG }}
          os: ${{ matrix.os }}

      - name: Get ONNX version from ONNX Runtime
        id: get-onnx-version
        shell: bash
        run: |
          git -C onnxruntime/cmake/external/onnx/ fetch --tags --depth=1 2>/dev/null || true
          version=$(git -C onnxruntime/cmake/external/onnx/ describe --exact-match --tags 2>/dev/null || git -C onnxruntime/cmake/external/onnx/ rev-parse HEAD)
          echo "version=$version" | tee -a $GITHUB_OUTPUT

      - name: Build ONNX dependency (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-onnx-windows
        with:
          onnx-tag: ${{ steps.get-onnx-version.outputs.version }}
          os: ${{ matrix.container || matrix.os }}

      - name: Build ONNX dependency (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-onnx-linux
        with:
          onnx-tag: ${{ steps.get-onnx-version.outputs.version }}
          os: ${{ matrix.container || matrix.os }}

      - name: Build ONNX dependency (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-onnx-macos
        with:
          onnx-tag: ${{ steps.get-onnx-version.outputs.version }}
          os: ${{ matrix.container || matrix.os }}

      - name: Build wheel
        run: uv build --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          DML_DIR: ${{ steps.setup-onnxruntime-windows.outputs.dml-path }}
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_ORT: ${{ inputs.version }}

      - name: Repair wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          uvx --with patchelf auditwheel repair --strip dist/*.whl -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

      - name: Repair wheel (macOS)
        if: runner.os == 'macOS'
        run: |
          uvx --from delocate delocate-wheel -v dist/*.whl -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/
          uvx --from delocate delocate-listdeps dist/*.whl

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-generic-wheels-${{ matrix.name }}
          path: ./dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt
          vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_ORT: ${{ inputs.version }}

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-generic-sdist
          path: dist/*.tar.gz

      - name: Generate metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        run: |
          VERSION=$(uvx pkginfo dist/*.tar.gz | grep "^version:" | cut -d' ' -f2)
          cat << EOF > metadata.json
          {
            "package": "${{ env.PACKAGE_NAME }}",
            "version": "$VERSION",
            "onnxruntime_windows": "${{ env.ONNXRUNTIME_WINDOWS_TAG }}",
            "onnxruntime_linux": "${{ env.ONNXRUNTIME_LINUX_TAG }}",
            "onnxruntime_macos": "${{ env.ONNXRUNTIME_MACOS_TAG }}"
          }
          EOF

      - name: Upload metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-metadata
          path: metadata.json

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run cd-publish.yml
          -f artifact-pattern=${{ env.PACKAGE_NAME }}-generic-*
          -f package=vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
