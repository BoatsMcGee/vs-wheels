name: MLRT-OV

on:
  push:
    branches:
      - master
    paths:
      - vsmlrt/ov/**
      - .github/workflows/pkg-ov.yml
      - .github/actions/setup-onnx-*/**
      - .github/actions/setup-openvino-*/**
      - .github/cmake-cache/onnx-*/**
      - .github/cmake-cache/openvino-*/**
  pull_request:
    paths:
      - vsmlrt/ov/**
      - .github/workflows/pkg-ov.yml
      - .github/actions/setup-onnx-*/**
      - .github/actions/setup-openvino-*/**
      - .github/cmake-cache/onnx-*/**
      - .github/cmake-cache/openvino-*/**
  schedule:
    - cron: 23 3 1-30/4 * *
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_OV)
        type: string
        required: false
      openvino-windows-tag:
        description: OpenVINO tag for Windows (https://github.com/openvinotoolkit/openvino/)
        type: string
        required: false
        default: "2026.2.1" # renovate: datasource=github-tags depName=openvinotoolkit/openvino
      openvino-linux-tag:
        description: OpenVINO tag for Linux (https://github.com/openvinotoolkit/openvino/)
        type: string
        required: false
        default: "2026.2.1" # renovate: datasource=github-tags depName=openvinotoolkit/openvino
      openvino-macos-arm64-tag:
        description: OpenVINO tag for macOS ARM64 (https://github.com/openvinotoolkit/openvino/)
        type: string
        required: false
        default: "2026.2.1" # renovate: datasource=github-tags depName=openvinotoolkit/openvino
      openvino-macos-x86-64-tag:
        description: OpenVINO tag for macOS x86_64 (https://github.com/openvinotoolkit/openvino/)
        type: string
        required: false
        default: "2026.2.0"

env:
  OPENVINO_WINDOWS_TAG: ${{ inputs.openvino-windows-tag || '2026.2.1' }} # renovate: datasource=github-tags depName=openvinotoolkit/openvino
  OPENVINO_LINUX_TAG: ${{ inputs.openvino-linux-tag || '2026.2.1' }} # renovate: datasource=github-tags depName=openvinotoolkit/openvino
  OPENVINO_MACOS_ARM64_TAG: ${{ inputs.openvino-macos-arm64-tag || '2026.2.1' }} # renovate: datasource=github-tags depName=openvinotoolkit/openvino
  OPENVINO_MACOS_x86_64_TAG: ${{ inputs.openvino-macos-x86-64-tag || '2026.2.1' }} # renovate: datasource=github-tags depName=openvinotoolkit/openvino
  PACKAGE_NAME: ov

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x86_64
            os: ubuntu-24.04
            container: quay.io/pypa/manylinux_2_28_x86_64
          - name: Linux aarch64
            os: ubuntu-22.04-arm
          - name: Windows
            os: windows-2022
          - name: macOS ARM64
            os: macos-14
          - name: macOS x86_64
            os: macos-15-intel

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          uv tool install cmake
          uv tool install ninja

      - name: Build OpenVINO dependency (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-openvino-windows
        with:
          openvino-tag: ${{ env.OPENVINO_WINDOWS_TAG }}
          os: ${{ matrix.os }}

      - name: Build OpenVINO dependency (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-openvino-linux
        with:
          openvino-tag: ${{ env.OPENVINO_LINUX_TAG }}
          os: ${{ matrix.container || matrix.os }}

      - name: Build OpenVINO dependency (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-openvino-macos
        with:
          openvino-tag: ${{ runner.arch == 'ARM64' && env.OPENVINO_MACOS_ARM64_TAG || env.OPENVINO_MACOS_x86_64_TAG }}
          os: ${{ matrix.os }}
      - name: Install jq
        if: matrix.container
        run: dnf install -y jq

      - name: Get ONNX version from OpenVINO
        id: get-onnx-version
        shell: bash
        run: |
          OV_TAG="${{ 
            runner.os == 'Windows' && env.OPENVINO_WINDOWS_TAG || 
            runner.os == 'Linux' && env.OPENVINO_LINUX_TAG || 
            runner.arch == 'ARM64' && env.OPENVINO_MACOS_ARM64_TAG || env.OPENVINO_MACOS_x86_64_TAG
           }}"
          version=$(curl -sS -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/openvinotoolkit/openvino/contents/thirdparty/onnx/onnx?ref=$OV_TAG" | jq -r '.sha // empty')

          if [ -z "$version" ] || [ "$version" = "null" ]; then
            version=$(git -C openvino/thirdparty/onnx/onnx rev-parse HEAD 2>/dev/null || true)
          fi

          if [ -z "$version" ]; then
            echo "Error: Failed to determine ONNX version" >&2
            exit 1
          fi
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Build ONNX dependency (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-onnx-windows
        with:
          onnx-tag: ${{ steps.get-onnx-version.outputs.version }}
          use-external-protobuf: true
          os: ${{ matrix.os }}

      - name: Build ONNX dependency (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-onnx-linux
        with:
          onnx-tag: ${{ steps.get-onnx-version.outputs.version }}
          use-external-protobuf: true
          os: ${{ matrix.container || matrix.os }}

      - name: Build ONNX dependency (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/setup-onnx-macos
        with:
          onnx-tag: ${{ steps.get-onnx-version.outputs.version }}
          use-external-protobuf: true
          os: ${{ matrix.os }}

      - name: Build wheel
        run: uv build --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_OV: ${{ inputs.version }}

      - name: Repair wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          uvx --with patchelf auditwheel repair \
            --exclude libOpenCL.so.* \
            --exclude libopenvino.so.* \
            --strip dist/*.whl \
            -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

      - name: Repair wheel (macOS)
        if: runner.os == 'macOS'
        run: |
          uv tool install delocate
          delocate-listdeps dist/*.whl
          delocate-wheel -v dist/*.whl -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-wheels-${{ matrix.name }}
          path: ./dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt
          vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_OV: ${{ inputs.version }}

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-sdist
          path: dist/*.tar.gz

      - name: Generate metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        run: |
          VERSION=$(uvx pkginfo dist/*.tar.gz | grep "^version:" | cut -d' ' -f2)
          cat << EOF > metadata.json
          {
            "package": "vapoursynth-mlrt-${{ env.PACKAGE_NAME }}",
            "version": "$VERSION",
            "openvino_windows": "${{ env.OPENVINO_WINDOWS_TAG }}",
            "openvino_linux": "${{ env.OPENVINO_LINUX_TAG }}",
            "openvino_macos_arm64": "${{ env.OPENVINO_MACOS_ARM64_TAG }}",
            "openvino_macos_intel": "${{ env.OPENVINO_MACOS_x86_64_TAG }}"
          }
          EOF

      - name: Upload metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-metadata
          path: metadata.json

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run cd-publish.yml
          -f artifact-pattern=${{ env.PACKAGE_NAME }}-*
          -f package=vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
