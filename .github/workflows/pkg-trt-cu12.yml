name: MLRT-TRT-CU12

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_TRT)
        type: string
        required: false
      cuda-windows:
        description: CUDA version for Windows
        type: string
        required: false
        default: "12.9.2"
      tensorrt-windows:
        description: TensorRT version for Windows (https://developer.nvidia.com/tensorrt/download/)
        type: string
        required: false
        default: "11.1.0.106"
      windows-runner:
        description: Windows runner to use
        type: choice
        required: true
        default: windows-2022
        options:
          - windows-2022
          - windows-2025
  workflow_call:
    inputs:
      version:
        type: string
        required: false
      cuda-windows:
        type: string
        required: false
        default: "12.9.2"
      tensorrt-windows:
        type: string
        required: false
        default: "11.1.0.106"
      windows-runner:
        type: string
        required: false
        default: "windows-2022"

env:
  CUDA_WINDOWS_VERSION: ${{ inputs.cuda-windows || '12.9.2' }}
  TENSORRT_WINDOWS_VERSION: ${{ inputs.tensorrt-windows || '11.1.0.106' }}
  PACKAGE_NAME: trt

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: ${{ inputs.windows-runner || 'windows-2022' }}

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "$env:GITHUB_WORKSPACE"
          git submodule update --init --recursive vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Setup MSVC
        uses: ./.github/actions/setup-msvc

      - name: Install build tools
        run: |
          uv tool install cmake
          uv tool install ninja

      - name: Setup CUDA (Windows)
        uses: ./.github/actions/setup-cuda-windows-cu12
        with:
          cuda-version: ${{ env.CUDA_WINDOWS_VERSION }}
          cache-key: ${{ matrix.os }}

      - name: Setup TensorRT (Windows)
        uses: ./.github/actions/setup-tensorrt-windows
        with:
          tensorrt-version: ${{ env.TENSORRT_WINDOWS_VERSION }}
          cuda-version: "12.9"
          cache-key: ${{ matrix.os }}

      - name: Build wheel
        run: uv build --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_TRT: ${{ inputs.version }}

      - name: Extract wheel, bundle TensorRT binaries, and repack (Windows)
        shell: pwsh
        run: |
          $whl = Get-ChildItem -Path dist/*.whl | Select-Object -First 1
          $extractDir = "wheel_extracted"
          Expand-Archive -LiteralPath $whl.FullName -DestinationPath $extractDir -Force
          $pluginDir = Get-ChildItem -Path $extractDir -Recurse -Filter "vstrt.dll" | Select-Object -First 1 | ForEach-Object { $_.Directory }
          if (-not $pluginDir) { throw "Could not find vstrt.dll in extracted wheel" }
          Write-Host "Plugin directory: $($pluginDir.FullName)"

          # Bundle TensorRT executables and DLLs into vsmlrt-cuda/ for runtime use
          # (trtexec.exe, nvinfer_11.dll, nvinfer_plugin_11.dll, etc.)
          # The patch tries tensorrt_libs/ first, then falls back to vsmlrt-cuda/.
          $vsmlrtCudaDir = Join-Path $pluginDir.FullName "vsmlrt-cuda"
          New-Item -ItemType Directory -Path $vsmlrtCudaDir -Force | Out-Null

          # Find the TensorRT bin/ folder (contains trtexec.exe and all DLLs)
          $trtBin = Get-ChildItem -Path $env:TENSORRT_HOME -Recurse -Directory -Filter "bin" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($trtBin) {
            Copy-Item "$trtBin\*" -Destination $vsmlrtCudaDir -Force
            Write-Host "Copied all files from $($trtBin.FullName) to vsmlrt-cuda/"
          } else {
            Write-Warning "TensorRT bin/ folder not found under $env:TENSORRT_HOME, falling back to nvinfer DLLs only"
            $trtDlls = @("nvinfer_11.dll", "nvinfer_plugin_11.dll")
            foreach ($dll in $trtDlls) {
              $found = Get-ChildItem -Path $env:TENSORRT_HOME -Recurse -Filter $dll -ErrorAction SilentlyContinue | Select-Object -First 1
              if ($found) {
                Copy-Item $found.FullName -Destination $vsmlrtCudaDir -Force
                Write-Host "Copied $dll from $($found.FullName)"
              } else {
                Write-Warning "NOT FOUND: $dll under $env:TENSORRT_HOME"
              }
            }
          }

          Remove-Item $whl.FullName -Force
          uv tool run wheel pack $extractDir -d dist/
          Remove-Item -Recurse -Force $extractDir

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-wheels-${{ matrix.name }}-cu12
          path: ./dist/*

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt
          vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_TRT: ${{ inputs.version }}

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-sdist-cu12
          path: dist/*.tar.gz
