name: MLRT-TRT-RTX

on:
  push:
    branches:
      - master
    paths:
      - vsmlrt/trt_rtx/**
      - .github/workflows/pkg-trt-rtx.yml
      - .github/actions/setup-cuda-*/**
      - .github/actions/setup-tensorrt-rtx-*/**
  pull_request:
    paths:
      - vsmlrt/trt_rtx/**
      - .github/workflows/pkg-trt-rtx.yml
      - .github/actions/setup-cuda-*/**
      - .github/actions/setup-tensorrt-rtx-*/**
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_TRT_RTX)
        type: string
        required: false
      cuda-windows:
        description: CUDA version for Windows
        type: string
        required: false
        default: "13.2.1"
      cuda-linux:
        description: CUDA version for Linux x86_64
        type: string
        required: false
        default: "13.2"
      tensorrt-rtx-windows:
        description: TensorRT version for Windows (https://developer.nvidia.com/tensorrt-rtx)
        type: string
        required: false
        default: "1.5.0.114" # renovate: datasource=pypi depName=tensorrt-rtx-cu13-libs
      tensorrt-rtx-linux:
        description: TensorRT version for Linux x86_64 (https://developer.nvidia.com/tensorrt-rtx)
        type: string
        required: false
        default: "1.5.0.114" # renovate: datasource=pypi depName=tensorrt-rtx-cu13-libs

env:
  CUDA_WINDOWS_VERSION: ${{ inputs.cuda-windows || '13.2.1' }}
  CUDA_LINUX_VERSION: ${{ inputs.cuda-linux|| '13.2' }}
  TENSORRT_RTX_WINDOWS_VERSION: ${{ inputs.tensorrt-rtx-windows || '1.5.0.114' }} # renovate: datasource=pypi depName=tensorrt-rtx-cu13-libs
  TENSORRT_RTX_LINUX_VERSION: ${{ inputs.tensorrt-rtx-linux || '1.5.0.114' }} # renovate: datasource=pypi depName=tensorrt-rtx-cu13-libs
  PACKAGE_NAME: trt_rtx

jobs:
  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-22.04
            cuda-repo: rhel8/x86_64
            container: quay.io/pypa/manylinux_2_28_x86_64
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            cuda-repo: rhel10/sbsa
            container: quay.io/pypa/manylinux_2_39_aarch64
          - name: Windows x64
            os: windows-2025-vs2026

    name: Build wheels on ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    container: ${{ matrix.container }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git submodule update --init --recursive vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-msvc

      - name: Install build tools (Linux)
        if: runner.os == 'Linux'
        run: |
          uv tool install cmake
          uv tool install ninja

      - name: Setup CUDA (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-cuda-windows
        with:
          cuda-version: ${{ env.CUDA_WINDOWS_VERSION }}
          cuda-components: >-
            nvcc,
            cudart,
            cuda_profiler_api,
            crt,
            nvptxcompiler
          cache-key: ${{ matrix.os }}

      - name: Setup TensorRT RTX (Windows)
        if: runner.os == 'Windows'
        uses: ./.github/actions/setup-tensorrt-rtx-windows
        with:
          tensorrt-rtx-version: ${{ env.TENSORRT_RTX_WINDOWS_VERSION }}
          cuda-version: ${{ env.CUDA_WINDOWS_VERSION }}

      - name: Setup TensorRT RTX (Linux)
        if: runner.os == 'Linux'
        uses: ./.github/actions/setup-tensorrt-rtx-linux
        with:
          tensorrt-rtx-version: ${{ env.TENSORRT_RTX_LINUX_VERSION }}
          cuda-repo: ${{ matrix.cuda-repo }}
          cuda-version: ${{ env.CUDA_LINUX_VERSION }}

      - name: Build wheel
        run: uv build --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_TRT_RTX: ${{ inputs.version }}

      - name: Repair wheel (Linux)
        if: runner.os == 'Linux'
        run: |
          uvx --with patchelf auditwheel repair --exclude libtensorrt_rtx.so.* --strip dist/*.whl -w repaired_wheels
          rm dist/*.whl
          mv repaired_wheels/*.whl dist/

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-wheels-${{ matrix.name }}
          path: ./dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Initialize submodules
        run: >-
          git submodule update --init --recursive
          vsmlrt/${{ env.PACKAGE_NAME }}/vs-mlrt
          vsmlrt/${{ env.PACKAGE_NAME }}/vapoursynth

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Build sdist
        run: uv build --sdist --package vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VAPOURSYNTH_MLRT_TRT_RTX: ${{ inputs.version }}

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-sdist
          path: dist/*.tar.gz

      - name: Generate metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        run: |
          VERSION=$(uvx pkginfo dist/*.tar.gz | grep "^version:" | cut -d' ' -f2)
          cat << EOF > metadata.json
          {
            "package": "vapoursynth-mlrt-${{ env.PACKAGE_NAME }}",
            "version": "$VERSION",
            "cuda_windows": "${{ env.CUDA_WINDOWS_VERSION }}",
            "cuda_linux": "${{ env.CUDA_LINUX_VERSION }}",
            "tensorrt_rtx_windows": "${{ env.TENSORRT_RTX_WINDOWS_VERSION }}",
            "tensorrt_rtx_linux": "${{ env.TENSORRT_RTX_LINUX_VERSION }}"
          }
          EOF

      - name: Upload metadata
        if: github.event_name == 'workflow_dispatch' && inputs.publish && inputs.repository == 'pypi'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: ${{ env.PACKAGE_NAME }}-metadata
          path: metadata.json

  trigger-publish:
    name: Trigger ${{ inputs.repository }} publish
    if: github.event_name == 'workflow_dispatch' && inputs.publish
    needs: [build-wheels, build-sdist]
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read

    steps:
      - name: Trigger publish workflow
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          REPOSITORY_URL: ${{ inputs.repository == 'testpypi' && 'https://test.pypi.org/legacy/' || 'https://upload.pypi.org/legacy/' }}
        run: >-
          gh workflow run cd-publish.yml
          -f artifact-pattern=${{ env.PACKAGE_NAME }}-*
          -f package=vapoursynth-mlrt-${{ env.PACKAGE_NAME }}
          -f packages-dir=dist
          -f repository=${{ inputs.repository }}
          -f repository-url="$REPOSITORY_URL"
          -f run-id=${{ github.run_id }}
          --ref ${{ github.ref_name }}
