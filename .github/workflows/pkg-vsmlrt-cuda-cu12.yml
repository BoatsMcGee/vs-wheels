name: VSMLRT-CUDA-CU12

on:
  workflow_dispatch:
    inputs:
      publish:
        description: Publish built distributions
        type: boolean
        required: false
        default: false
      repository:
        description: Package index to publish to
        type: choice
        required: true
        default: testpypi
        options:
          - testpypi
          - pypi
      version:
        description: Version override (SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VSMLRT_CUDA)
        type: string
        required: false
      cuda-windows:
        description: CUDA version for Windows
        type: string
        required: false
        default: "12.9.2"
      tensorrt-windows:
        description: TensorRT version for Windows (https://developer.nvidia.com/tensorrt/download/)
        type: string
        required: false
        default: "11.1.0.106"
      windows-runner:
        description: Windows runner to use
        type: choice
        required: true
        default: windows-2022
        options:
          - windows-2022
          - windows-2025
  workflow_call:
    inputs:
      version:
        type: string
        required: false
      cuda-windows:
        type: string
        required: false
        default: "12.9.2"
      tensorrt-windows:
        type: string
        required: false
        default: "11.1.0.106"
      windows-runner:
        type: string
        required: false
        default: "windows-2022"

env:
  CUDA_WINDOWS_VERSION: ${{ inputs.cuda-windows || '12.9.2' }}
  TENSORRT_WINDOWS_VERSION: ${{ inputs.tensorrt-windows || '11.1.0.106' }}
  PACKAGE_NAME: vsmlrt-cuda

jobs:
  build-wheels:
    name: Build wheels on Windows x64
    runs-on: ${{ inputs.windows-runner || 'windows-2022' }}

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Setup CUDA (Windows)
        uses: ./.github/actions/setup-cuda-windows-cu12
        with:
          cuda-version: ${{ env.CUDA_WINDOWS_VERSION }}
          cache-key: windows-vsmlrt-cuda

      - name: Setup TensorRT (Windows)
        uses: ./.github/actions/setup-tensorrt-windows
        with:
          tensorrt-version: ${{ env.TENSORRT_WINDOWS_VERSION }}
          cuda-version: "12.9"
          cache-key: windows-vsmlrt-cuda

      - name: Populate vsmlrt-cuda directory
        shell: pwsh
        run: |
          $packageDir = "vsmlrt/vsmlrt_cuda"
          $targetDir = Join-Path $packageDir "vapoursynth/plugins/vsmlrt-cuda"
          New-Item -ItemType Directory -Path $targetDir -Force | Out-Null

          # Copy all TensorRT bin/ files (trtexec.exe, nvinfer_11.dll, etc.)
          $trtBin = Get-ChildItem -Path $env:TENSORRT_HOME -Recurse -Directory -Filter "bin" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($trtBin) {
            Copy-Item "$trtBin\*" -Destination $targetDir -Force
            Write-Host "Copied TensorRT bin/ from $($trtBin.FullName)"
          } else {
            Write-Warning "TensorRT bin/ not found under $env:TENSORRT_HOME"
          }

          # Copy CUDA runtime DLLs
          $cudaBin = "$env:CUDA_PATH\bin"
          if (Test-Path $cudaBin) {
            $cudaDlls = @(
              "cudart64_12.dll",
              "cufft64_11.dll",
              "cufftw64_11.dll",
              "nvrtc64_120_0.dll",
              "nvJitLink_120_0.dll",
              "nvptxcompiler64_120_0.dll",
              "cublas64_12.dll",
              "cublasLt64_12.dll"
            )
            foreach ($dll in $cudaDlls) {
              $src = Join-Path $cudaBin $dll
              if (Test-Path $src) {
                Copy-Item $src -Destination $targetDir -Force
                Write-Host "Copied $dll"
              } else {
                Write-Host "NOT FOUND: $src"
              }
            }
          } else {
            Write-Warning "CUDA bin not found at $cudaBin"
          }

          Get-ChildItem $targetDir | ForEach-Object { Write-Host "  $($_.Name)" }

      - name: Set version
        shell: pwsh
        run: |
          $versionFile = "vsmlrt/vsmlrt_cuda/_version.py"
          $version = "${{ inputs.version }}"
          if (-not $version) { $version = "0.0.0" }
          "version = `"$version`"" | Set-Content $versionFile -Encoding UTF8
          Get-Content $versionFile

      - name: Build wheel
        run: uv build --wheel --package vsmlrt-cuda
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VSMLRT_CUDA: ${{ inputs.version }}

      - name: Upload wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vsmlrt-cuda-wheels-Windows-x64-cu12
          path: dist/*.whl

  build-sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c91bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - name: Set up uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: false

      - name: Set version
        shell: pwsh
        run: |
          $versionFile = "vsmlrt/vsmlrt_cuda/_version.py"
          $version = "${{ inputs.version }}"
          if (-not $version) { $version = "0.0.0" }
          "version = `"$version`"" | Set-Content $versionFile -Encoding UTF8
          Get-Content $versionFile

      - name: Build sdist
        run: uv build --sdist --package vsmlrt-cuda
        env:
          SETUPTOOLS_SCM_PRETEND_VERSION_FOR_VSMLRT_CUDA: ${{ inputs.version }}

      - name: Upload sdist
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: vsmlrt-cuda-sdist-cu12
          path: dist/*.tar.gz
